<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>لوحة التحكم</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-white p-6">

<div class="max-w-5xl mx-auto space-y-6">

  <div class="flex justify-between items-center">
    <h1 class="text-3xl font-black">لوحة التحكم</h1>
    <button onclick="logout()" class="bg-red-600 px-4 py-2 rounded-xl">تسجيل خروج</button>
  </div>

  <select id="carSelect" class="w-full p-3 rounded-xl bg-slate-900"></select>

  <input id="name" placeholder="اسم السيارة" class="w-full p-3 rounded-xl bg-slate-900">
  <input id="price" placeholder="السعر" class="w-full p-3 rounded-xl bg-slate-900">
  <input id="year" placeholder="السنة" class="w-full p-3 rounded-xl bg-slate-900">
  <input id="mileage" placeholder="كم" class="w-full p-3 rounded-xl bg-slate-900">
  <input id="condition" placeholder="الحالة" class="w-full p-3 rounded-xl bg-slate-900">
  
  <textarea id="description" class="w-full p-3 rounded-xl bg-slate-900"></textarea>

  <input type="file" id="imageFile" class="w-full">

  <button onclick="saveCar()" class="w-full bg-green-500 p-3 rounded-xl">حفظ</button>

  <div id="msg"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
'https://beyxyvibqzhtyawqrhbv.supabase.co',
'sb_publishable_iMt3G9iAvXawW3QN6vGWjw_BOw8qLFK'
);

async function checkLogin(){
  const {data} = await supabase.auth.getSession();
  if(!data.session){
    window.location='login.html';
  }
}
checkLogin();

async function loadCars(){
  const {data} = await supabase.from('cars').select('*');

  const select = document.getElementById('carSelect');
  select.innerHTML = data.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');

  select.onchange = ()=>{
    const car = data.find(x=>x.id == select.value);
    document.getElementById('name').value = car.name;
    document.getElementById('price').value = car.price;
    document.getElementById('year').value = car.year;
    document.getElementById('mileage').value = car.mileage;
    document.getElementById('condition').value = car.condition;
    document.getElementById('description').value = car.description;
  }

  select.onchange();
}

loadCars();

async function saveCar(){
  const id = document.getElementById('carSelect').value;

  const update = {
    id,
    name: document.getElementById('name').value,
    price: document.getElementById('price').value,
    year: document.getElementById('year').value,
    mileage: document.getElementById('mileage').value,
    condition: document.getElementById('condition').value,
    description: document.getElementById('description').value
  };

  await supabase.from('cars').upsert(update);

  document.getElementById('msg').innerText = "تم الحفظ ✅";
}

async function logout(){
  await supabase.auth.signOut();
  window.location='login.html';
}
</script>

</body>
</html>
