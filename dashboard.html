<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-6 bg-gray-100">

<h1 class="text-3xl font-bold mb-4">Dashboard</h1>

<select id="carSelect" class="p-3 border rounded w-full mb-4"></select>

<div id="msg"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  'https://beyxyvibqzhtyawqrhbv.supabase.co',
  'sb_publishable_iMt3G9iAvXawW3QN6vGWjw_B0w8qLFK'
);

// سيارات افتراضية (30 سيارة)
const defaultCars = [
  { id:1, name:"Mercedes S-Class" },
  { id:2, name:"BMW X7" },
  { id:3, name:"Audi RS7" },
  { id:4, name:"Range Rover Sport" },
  { id:5, name:"Porsche Taycan" },
  { id:6, name:"Lexus LX" },
  { id:7, name:"Cadillac Escalade" },
  { id:8, name:"Bentley Bentayga" },
  { id:9, name:"Rolls Royce Ghost" },
  { id:10, name:"Tesla Model S" },
  { id:11, name:"Ferrari Roma" },
  { id:12, name:"Lamborghini Urus" },
  { id:13, name:"Maserati Levante" },
  { id:14, name:"Jaguar F Pace" },
  { id:15, name:"Genesis G90" },
  { id:16, name:"Volvo XC90" },
  { id:17, name:"Toyota Land Cruiser" },
  { id:18, name:"GMC Yukon Denali" },
  { id:19, name:"Jeep Grand Wagoneer" },
  { id:20, name:"Aston Martin DBX" },
  { id:21, name:"Mercedes GLE 450" },
  { id:22, name:"BMW 740i" },
  { id:23, name:"Audi Q8" },
  { id:24, name:"Porsche Cayenne" },
  { id:25, name:"VW Touareg" },
  { id:26, name:"Land Rover Defender" },
  { id:27, name:"Kia EV9" },
  { id:28, name:"Hyundai Palisade" },
  { id:29, name:"Nissan Patrol" },
  { id:30, name:"Chevrolet Tahoe" }
];

const select = document.getElementById('carSelect');
const msg = document.getElementById('msg');

// تحميل السيارات
async function loadCars() {
  const { data, error } = await supabase.from('cars').select('*');

  if (error) {
    msg.innerText = "❌ Error: " + error.message;
    return;
  }

  // إذا فاضي → أدخل السيارات
  if (!data || data.length === 0) {
    await supabase.from('cars').insert(defaultCars);
    return loadCars();
  }

  renderCars(data);
}

// عرض السيارات
function renderCars(cars) {
  select.innerHTML = "";

  cars.forEach(car => {
    const option = document.createElement("option");
    option.value = car.id;
    option.textContent = car.name;
    select.appendChild(option);
  });

  msg.innerText = "✅ تم تحميل السيارات (" + cars.length + ")";
}

// تشغيل
loadCars();

</script>

</body>
</html>
