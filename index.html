<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emotion Car & Service UG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin:0; font-family:'Tajawal',Arial,sans-serif; background:linear-gradient(135deg,#020617 0%,#0b1f3a 50%,#000 100%); color:#fff; }
    a { text-decoration:none; color:inherit; }
    .container{ width:min(1200px,calc(100% - 32px)); margin:0 auto; }
    .section{ padding:56px 0; }
    .top-nav{ position:sticky; top:0; z-index:100; background:rgba(7,16,32,.96); border-bottom:1px solid rgba(255,255,255,.08); backdrop-filter:blur(10px); }
    .top-nav-inner{ display:flex; align-items:center; justify-content:space-between; gap:24px; padding:14px 0; }
    .brand-pill{ display:flex; align-items:center; gap:14px; }
    .logo{ width:140px; height:90px; object-fit:cover; border-radius:18px; background:rgba(255,255,255,.1); padding:6px; border:1px solid rgba(255,255,255,.18); }
    .brand-text strong{ display:block; font-size:26px; }
    .status-row{ margin-top:6px; display:flex; align-items:center; gap:8px; font-size:13px; }
    .status-dot{ width:10px; height:10px; border-radius:50%; background:#999; }
    .nav-menu{ display:flex; gap:24px; }
    .login-link{ padding:10px 14px; border-radius:12px; background:rgba(255,255,255,.08); }

    h1{ text-align:center; font-size:56px; font-weight:900; }

    .filters{ display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
    input,select{ padding:10px; border-radius:12px; background:#0f172a; color:#fff; border:1px solid rgba(255,255,255,.1); }
    .grid{ display:grid; gap:16px; }
    .cars-grid{ grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); }

    .car-card{ background:#0f172a; border-radius:20px; overflow:hidden; border:1px solid rgba(255,255,255,.08); }
    .car-image{ width:100%; height:200px; object-fit:cover; cursor:pointer; }
    .car-content{ padding:16px; }
    .price{ color:#22c55e; font-weight:bold; }
    .details-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:10px; }

    .modal{ position:fixed; inset:0; background:rgba(0,0,0,.8); display:none; align-items:center; justify-content:center; }
    .modal.show{ display:flex; }
    .modal-card{ background:#0f172a; padding:20px; border-radius:20px; width:min(900px,100%); }
    .modal-image{ width:100%; height:300px; object-fit:cover; }
  </style>
</head>
<body>

<header class="top-nav">
  <div class="container top-nav-inner">
    <div class="brand-pill">
      <img src="images/logo.png" class="logo">
      <div class="brand-text">
        <strong>Emotion Car & Service UG</strong>
        <div class="status-row">
          <span id="statusDot" class="status-dot"></span>
          <span id="statusText">...</span>
        </div>
      </div>
    </div>
    <nav class="nav-menu">
      <a href="#cars">السيارات</a>
      <a href="#contact">تواصل</a>
    </nav>
    <a class="login-link" href="login.html">تسجيل</a>
  </div>
</header>

<section class="section">
  <div class="container">
    <h1>معرض السيارات</h1>

    <div class="filters">
      <input id="searchInput" placeholder="ابحث...">
      <select id="categoryFilter">
        <option value="all">الكل</option>
        <option value="SUV">SUV</option>
        <option value="Sedan">Sedan</option>
        <option value="Sport">Sport</option>
      </select>
    </div>

    <div id="inventoryCars" class="grid cars-grid"></div>
  </div>
</section>

<div id="carModal" class="modal">
  <div class="modal-card">
    <img id="modalImage" class="modal-image">
    <h2 id="modalName"></h2>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://mbesnbkludynomgdzfhw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_EfwicNkVNrNBXKBgoiMXjA_VqTcfnTm';
const BUCKET = 'site-images';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function getPublicImage(path){
  if(!path) return '';
  if(path.startsWith('http')||path.startsWith('data:')) return path;
  const {data} = supabase.storage.from(BUCKET).getPublicUrl(path);
  return data.publicUrl;
}

let cars=[];

async function loadCars(){
  const {data}=await supabase.from('cars').select('*').order('id');
  cars = data.map(row=>({
    ...row,
    image: getPublicImage(row.image)
  }));
  render();
}

function render(){
  const el=document.getElementById('inventoryCars');
  const search=document.getElementById('searchInput').value.toLowerCase();
  const cat=document.getElementById('categoryFilter').value;

  const filtered=cars.filter(c=>{
    return (c.name||'').toLowerCase().includes(search) && (cat==='all'||c.category===cat);
  });

  el.innerHTML=filtered.map(c=>`
    <div class="car-card">
      <img class="car-image" src="${c.image}" data-id="${c.id}">
      <div class="car-content">
        <div class="price">${c.price}</div>
        <h3>${c.name}</h3>
      </div>
    </div>
  `).join('');
}

document.addEventListener('click',e=>{
  if(e.target.classList.contains('car-image')){
    const id=e.target.dataset.id;
    const car=cars.find(c=>c.id==id);
    document.getElementById('modalImage').src=car.image;
    document.getElementById('modalName').textContent=car.name;
    document.getElementById('carModal').classList.add('show');
  }
});

loadCars();
</script>

</body>
</html>
