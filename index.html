<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emotion Car - Responsive Merge</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
    }

    .view {
      width: 100%;
      height: 100%;
      border: 0;
      display: none;
    }

    .desktop-view {
      display: block;
    }

    @media (max-width: 760px) {
      .desktop-view {
        display: none;
      }
      .mobile-view {
        display: block;
      }
    }
  </style>
</head>
<body>
  <iframe class="view desktop-view" src="compeutr.html" title="Desktop Version"></iframe>
  <iframe class="view mobile-view" src="mobile(1).html" title="Mobile Version"></iframe>
</body>
</html>
