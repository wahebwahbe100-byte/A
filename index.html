      &#x27;https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&amp;fit=crop&amp;w=1800&amp;q=80&#x27;
    ];

    const carSeed = [
      [&#x27;Mercedes&#x27;, &#x27;S-Class&#x27;, &#x27;Sedan&#x27;, &#x27;€128,000&#x27;, 2024, &#x27;8,000 km&#x27;, &#x27;Sehr gut&#x27;],
      [&#x27;BMW&#x27;, &#x27;X7&#x27;, &#x27;SUV&#x27;, &#x27;€102,500&#x27;, 2023, &#x27;14,500 km&#x27;, &#x27;Sehr gut&#x27;],
      [&#x27;Audi&#x27;, &#x27;RS7&#x27;, &#x27;Sport&#x27;, &#x27;€119,900&#x27;, 2024, &#x27;5,200 km&#x27;, &#x27;Sehr gut&#x27;],
      [&#x27;Range Rover&#x27;, &#x27;Sport&#x27;, &#x27;SUV&#x27;, &#x27;€115,300&#x27;, 2023, &#x27;18,100 km&#x27;, &#x27;Sehr gut&#x27;],
      [&#x27;Porsche&#x27;, &#x27;Taycan&#x27;, &#x27;Sport&#x27;, &#x27;€134,800&#x27;, 2024, &#x27;3,700 km&#x27;, &#x27;Sehr gut&#x27;],
      [&#x27;Lexus&#x27;, &#x27;LX&#x27;, &#x27;SUV&#x27;, &#x27;€92,000&#x27;, 2022, &#x27;21,000 km&#x27;, &#x27;Sehr gut&#x27;],
      [&#x27;Cadillac&#x27;, &#x27;Escalade&#x27;, &#x27;SUV&#x27;, &#x27;€97,000&#x27;, 2021, &#x27;26,000 km&#x27;, &#x27;Sehr gut&#x27;],
      [&#x27;Bentley&#x27;, &#x27;Bentayga&#x27;, &#x27;SUV&#x27;, &#x27;€154,000&#x27;, 2022, &#x27;19,500 km&#x27;, &#x27;Sehr gut&#x27;],
      [&#x27;Rolls-Royce&#x27;, &#x27;Ghost&#x27;, &#x27;Sedan&#x27;, &#x27;€210,000&#x27;, 2021, &#x27;17,800 km&#x27;, &#x27;Sehr gut&#x27;],
      [&#x27;Tesla&#x27;, &#x27;Model S&#x27;, &#x27;Sedan&#x27;, &#x27;€88,000&#x27;, 2023, &#x27;12,300 km&#x27;, &#x27;Sehr gut&#x27;],
      [&#x27;Ferrari&#x27;, &#x27;Roma&#x27;, &#x27;Sport&#x27;, &#x27;€199,000&#x27;, 2022, &#x27;7,400 km&#x27;, &#x27;Sehr gut&#x27;],
      [&#x27;Lamborghini&#x27;, &#x27;Urus&#x27;, &#x27;SUV&#x27;, &#x27;€239,000&#x27;, 2023, &#x27;6,900 km&#x27;, &#x27;Sehr gut&#x27;]
    ];

    const defaultCars = carSeed.map((item, index) =&gt; ({
      id: index + 1,
      brand: item[0],
      model: item[1],
      category: item[2],
      price: item[3],
      year: item[4],
      mileage: item[5],
      condition: item[6],
      name: `${item[0]} ${item[1]}`,
      description: &#x27;Fahrzeug in sehr gutem Zustand mit klaren Angaben und gemeinsamer Präsentation für Desktop und Mobile.&#x27;,
      image: heroStockImages[index % heroStockImages.length],
      gallery: [heroStockImages[index % heroStockImages.length]],
      isHidden: false
    }));

    function getPublicImage(value) {
      if (!value || typeof value !== &#x27;string&#x27;) return &#x27;&#x27;;
      const trimmed = value.trim();
      if (!trimmed) return &#x27;&#x27;;
      if (/^https?:\/\//i.test(trimmed) || trimmed.startsWith(&#x27;data:&#x27;)) return trimmed;
      const cleanPath = decodeURIComponent(trimmed)
        .replace(/^\/+/, &#x27;&#x27;)
        .replace(new RegExp(`^storage/v1/object/public/${STORAGE_BUCKET}/`), &#x27;&#x27;)
        .replace(new RegExp(`^${STORAGE_BUCKET}/`), &#x27;&#x27;);
      if (!supabaseClient) return `${imageBase}/${cleanPath}`;
      const { data } = supabaseClient.storage.from(STORAGE_BUCKET).getPublicUrl(cleanPath);
      return data?.publicUrl || `${imageBase}/${cleanPath}`;
    }

    function normalizeGallery(row, fallbackImage) {
      let gallery = [];
      if (Array.isArray(row.gallery)) gallery = row.gallery;
      else if (typeof row.gallery === &#x27;string&#x27; &amp;&amp; row.gallery.trim()) {
        try {
          const parsed = JSON.parse(row.gallery);
          gallery = Array.isArray(parsed) ? parsed : [row.gallery];
        } catch {
          gallery = [row.gallery];
        }
      }
      const normalized = gallery.map(getPublicImage).filter(Boolean);
      const mainImage = getPublicImage(row.image) || fallbackImage;
      if (mainImage &amp;&amp; !normalized.includes(mainImage)) normalized.unshift(mainImage);
      return normalized.length ? normalized : [fallbackImage];
    }

    function createCarsSignature(rows) {
      return JSON.stringify((rows || []).map((row, index) =&gt; ({
        id: row?.id ?? index + 1,
        image: row?.image || &#x27;&#x27;,
        updatedAt: row?.updated_at || row?.updatedAt || &#x27;&#x27;
      })));
    }

    function findCarById(id) {
      return cars.find((car) =&gt; String(car.id) === String(id));
    }

    function createCarCard(car) {
      return `
        &lt;article class=&quot;car-card&quot;&gt;
          &lt;div class=&quot;car-image-wrap&quot;&gt;
            &lt;img class=&quot;car-image&quot; src=&quot;${car.image || window.placeholderCar}&quot; alt=&quot;${car.name}&quot; onerror=&quot;this.onerror=null;this.src=window.placeholderCar&quot;&gt;
            &lt;div class=&quot;car-id&quot;&gt;#${car.id}&lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;car-body&quot;&gt;
            &lt;div class=&quot;car-price&quot;&gt;${car.price || &#x27;&#x27;}&lt;/div&gt;
            &lt;h3 class=&quot;car-name&quot;&gt;${car.name || &#x27;&#x27;}&lt;/h3&gt;
            &lt;div class=&quot;car-category&quot;&gt;${car.category || &#x27;&#x27;}&lt;/div&gt;
            &lt;div class=&quot;car-detail-grid&quot;&gt;
              &lt;div class=&quot;detail-box&quot;&gt;&lt;span&gt;Baujahr&lt;/span&gt;&lt;strong&gt;${car.year || &#x27;&#x27;}&lt;/strong&gt;&lt;/div&gt;
              &lt;div class=&quot;detail-box&quot;&gt;&lt;span&gt;Kilometer&lt;/span&gt;&lt;strong&gt;${car.mileage || &#x27;&#x27;}&lt;/strong&gt;&lt;/div&gt;
              &lt;div class=&quot;detail-box&quot;&gt;&lt;span&gt;Zustand&lt;/span&gt;&lt;strong&gt;${car.condition || &#x27;&#x27;}&lt;/strong&gt;&lt;/div&gt;
              &lt;div class=&quot;detail-box&quot;&gt;&lt;span&gt;Marke&lt;/span&gt;&lt;strong&gt;${car.brand || &#x27;&#x27;}&lt;/strong&gt;&lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;car-actions&quot;&gt;
              &lt;button class=&quot;btn-primary&quot; type=&quot;button&quot; onclick=&quot;openBuyPageById(${car.id})&quot;&gt;Jetzt anfragen&lt;/button&gt;
            &lt;/div&gt;
          &lt;/div&gt;
        &lt;/article&gt;
      `;
    }

    function renderInventory() {
      const inventory = document.getElementById(&#x27;inventoryCars&#x27;);
      const search = (document.getElementById(&#x27;searchInput&#x27;)?.value || &#x27;&#x27;).toLowerCase().trim();
      const category = document.getElementById(&#x27;categoryFilter&#x27;)?.value || &#x27;all&#x27;;

      const filtered = cars.filter((car) =&gt; {
        const searchable = `${car.name || &#x27;&#x27;} ${car.brand || &#x27;&#x27;} ${car.model || &#x27;&#x27;}`.toLowerCase();
        return !car.isHidden &amp;&amp; searchable.includes(search) &amp;&amp; (category === &#x27;all&#x27; || car.category === category);
      });

      const totalPages = Math.max(1, Math.ceil(filtered.length / carsPerPage));
      if (currentPage &gt; totalPages) currentPage = totalPages;
      const start = (currentPage - 1) * carsPerPage;
      const pageCars = filtered.slice(start, start + carsPerPage);

      inventory.innerHTML = pageCars.length ? pageCars.map(createCarCard).join(&#x27;&#x27;) : &#x27;&lt;div class=&quot;info-card&quot;&gt;Aktuell gibt es keine passenden Fahrzeuge.&lt;/div&gt;&#x27;;

      document.getElementById(&#x27;pagerInfo&#x27;).textContent = `Seite ${currentPage} von ${totalPages}`;
      document.getElementById(&#x27;prevPageBtn&#x27;).disabled = currentPage === 1;
      document.getElementById(&#x27;nextPageBtn&#x27;).disabled = currentPage === totalPages;

      syncHeroSlidesWithCars();
    }

    async function loadCars() {
      if (!supabaseClient) {
        cars = defaultCars;
        renderInventory();
        return;
      }

      try {
        const { data, error } = await supabaseClient.from(&#x27;cars&#x27;).select(&#x27;*&#x27;).order(&#x27;id&#x27;, { ascending: true });
        if (error) throw error;

        const rows = Array.isArray(data) ? data : [];
        const signature = createCarsSignature(rows);
        if (signature === lastCarsSignature &amp;&amp; cars.length) return;
        lastCarsSignature = signature;

        if (!rows.length) {
          cars = defaultCars;
          renderInventory();
          return;
        }

        cars = rows.map((row, index) =&gt; {
          const normalizedImage = getPublicImage(row.image) || heroStockImages[index % heroStockImages.length] || window.placeholderCar;
          return {
            ...row,
            id: row.id ?? index + 1,
            name: row.name || `${row.brand || &#x27;&#x27;} ${row.model || &#x27;&#x27;}`.trim() || `Fahrzeug ${index + 1}`,
            image: normalizedImage,
            gallery: normalizeGallery(row, normalizedImage),
            isHidden: Boolean(row.isHidden || row.ishidden || row.is_hidden)
          };
        });

        renderInventory();
      } catch (error) {
        console.error(error);
        cars = defaultCars;
        renderInventory();
      }
    }

    function openBuyPage(car) {
      const page = document.getElementById(&#x27;buyPage&#x27;);
      document.getElementById(&#x27;buyCarId&#x27;).value = car.id || &#x27;&#x27;;
      document.getElementById(&#x27;buyCarName&#x27;).value = car.name || &#x27;&#x27;;
      document.getElementById(&#x27;buyCarPrice&#x27;).value = car.price || &#x27;&#x27;;
      document.getElementById(&#x27;buyCarNameDisplay&#x27;).textContent = car.name || &#x27;Fahrzeug&#x27;;
      document.getElementById(&#x27;buyCarNameText&#x27;).textContent = car.name || &#x27;-&#x27;;
      document.getElementById(&#x27;buyCarPriceText&#x27;).textContent = car.price || &#x27;-&#x27;;
      document.getElementById(&#x27;buyCarInfoDisplay&#x27;).textContent = `${car.price || &#x27;&#x27;} • ${car.year || &#x27;&#x27;} • ${car.mileage || &#x27;&#x27;} • ${car.condition || &#x27;&#x27;}`;
      document.getElementById(&#x27;buyFormMessage&#x27;).textContent = &#x27;Bereit zum Senden.&#x27;;
      document.getElementById(&#x27;buyFormMessage&#x27;).style.color = &#x27;#64748b&#x27;;
      page.classList.add(&#x27;show&#x27;);
      page.scrollTop = 0;
    }

    function openBuyPageById(id) {
      const car = findCarById(id);
      if (car) openBuyPage(car);
    }

    function closeBuyPage() {
      document.getElementById(&#x27;buyPage&#x27;).classList.remove(&#x27;show&#x27;);
    }

    window.openBuyPageById = openBuyPageById;
    window.closeBuyPage = closeBuyPage;

    async function submitPurchaseRequest(event) {
      event.preventDefault();
      const msg = document.getElementById(&#x27;buyFormMessage&#x27;);

      const payload = {
        car_id: document.getElementById(&#x27;buyCarId&#x27;).value || null,
        car_name: document.getElementById(&#x27;buyCarName&#x27;).value.trim(),
        car_price: document.getElementById(&#x27;buyCarPrice&#x27;).value.trim(),
        buyer_name: document.getElementById(&#x27;buyerName&#x27;).value.trim(),
        buyer_phone: document.getElementById(&#x27;buyerPhone&#x27;).value.trim(),
        buyer_email: document.getElementById(&#x27;buyerEmail&#x27;).value.trim(),
        buyer_address: document.getElementById(&#x27;buyerAddress&#x27;).value.trim(),
        payment_method: document.getElementById(&#x27;paymentMethod&#x27;).value,
        visit_date: document.getElementById(&#x27;visitDate&#x27;).value || null,
        notes: document.getElementById(&#x27;buyerNotes&#x27;).value.trim(),
        request_status: &#x27;new&#x27;,
        payment_status: &#x27;pending&#x27;
      };

      if (!payload.buyer_name || !payload.buyer_phone || !payload.buyer_email || !payload.payment_method) {
        msg.textContent = &#x27;Bitte füllen Sie alle Pflichtfelder aus.&#x27;;
        msg.style.color = &#x27;#b91c1c&#x27;;
        return;
      }

      if (!supabaseClient) {
        msg.textContent = &#x27;Datenbankverbindung ist nicht verfügbar.&#x27;;
        msg.style.color = &#x27;#b91c1c&#x27;;
        return;
      }

      try {
        msg.textContent = &#x27;Anfrage wird gespeichert...&#x27;;
        msg.style.color = &#x27;#64748b&#x27;;
        const { error } = await supabaseClient.from(&#x27;car_purchase_requests&#x27;).insert([payload]);
        if (error) throw error;
        msg.textContent = &#x27;Ihre Anfrage wurde erfolgreich gesendet.&#x27;;
        msg.style.color = &#x27;#166534&#x27;;
        document.getElementById(&#x27;buyForm&#x27;).reset();
      } catch (error) {
        msg.textContent = error.message || &#x27;Fehler beim Speichern der Anfrage.&#x27;;
        msg.style.color = &#x27;#b91c1c&#x27;;
      }
    }

    function initHeroSlider() {
      const slider = document.getElementById(&#x27;heroSlider&#x27;);
      const slides = Array.from(slider.querySelectorAll(&#x27;.hero-slide&#x27;));
      const dots = Array.from(slider.querySelectorAll(&#x27;.hero-dot&#x27;));
      const prev = document.getElementById(&#x27;heroPrev&#x27;);
      const next = document.getElementById(&#x27;heroNext&#x27;);
      let current = 0;
      let timer = null;
      let touchStartX = 0;
      let touchEndX = 0;

      const showSlide = (index) =&gt; {
        current = (index + slides.length) % slides.length;
        slides.forEach((slide, i) =&gt; slide.classList.toggle(&#x27;active&#x27;, i === current));
        dots.forEach((dot, i) =&gt; dot.classList.toggle(&#x27;active&#x27;, i === current));
      };

      const stop = () =&gt; {
        if (timer) clearInterval(timer);
        timer = null;
      };

      const start = () =&gt; {
        stop();
        timer = setInterval(() =&gt; showSlide(current + 1), 5000);
      };

      prev.addEventListener(&#x27;click&#x27;, () =&gt; { showSlide(current - 1); start(); });
      next.addEventListener(&#x27;click&#x27;, () =&gt; { showSlide(current + 1); start(); });
      dots.forEach((dot, i) =&gt; dot.addEventListener(&#x27;click&#x27;, () =&gt; { showSlide(i); start(); }));

      slider.addEventListener(&#x27;touchstart&#x27;, (e) =&gt; {
        touchStartX = e.changedTouches[0].clientX;
        stop();
      }, { passive: true });

      slider.addEventListener(&#x27;touchend&#x27;, (e) =&gt; {
        touchEndX = e.changedTouches[0].clientX;
        const delta = touchEndX - touchStartX;
        if (Math.abs(delta) &gt; 40) {
          if (delta &lt; 0) showSlide(current + 1);
          else showSlide(current - 1);
        }
        start();
      }, { passive: true });

      showSlide(0);
      start();
      window.heroSliderApi = { showSlide };
    }

    function syncHeroSlidesWithCars() {
      const slides = Array.from(document.querySelectorAll(&#x27;.hero-slide&#x27;));
      const visibleCars = cars.filter((car) =&gt; !car.isHidden).slice(0, 3);
      if (!visibleCars.length) return;

      slides.forEach((slide, index) =&gt; {
        const car = visibleCars[index];
        if (!car) return;

        const img = slide.querySelector(&#x27;.hero-bg&#x27;);
        const kicker = slide.querySelector(&#x27;.hero-kicker&#x27;);
        const title = slide.querySelector(&#x27;.hero-title&#x27;);
        const meta = slide.querySelector(&#x27;.hero-meta&#x27;);
        const desc = slide.querySelector(&#x27;.hero-desc&#x27;);
        const cta = slide.querySelector(&#x27;.hero-btn&#x27;);

        if (img) {
          img.src = car.image || car.gallery?.[0] || heroStockImages[index % heroStockImages.length];
          img.alt = car.name || &#x27;car&#x27;;
        }
        if (kicker) kicker.textContent = car.category || &#x27;Premium Auswahl&#x27;;
        if (title) {
          const words = String(car.name || &#x27;&#x27;).split(/\s+/);
          title.innerHTML = words.length &gt;= 2 ? `${words[0]}&lt;br&gt;${words.slice(1).join(&#x27; &#x27;)}` : (car.name || &#x27;&#x27;);
        }
        if (meta) {
          meta.innerHTML = `
            ${car.year ? `&lt;span&gt;${car.year}&lt;/span&gt;` : &#x27;&#x27;}
            ${car.mileage ? `&lt;span&gt;${car.mileage}&lt;/span&gt;` : &#x27;&#x27;}
            ${car.condition ? `&lt;span&gt;${car.condition}&lt;/span&gt;` : &#x27;&#x27;}
          `;
        }
        if (desc) desc.textContent = car.description || &#x27;Fahrzeug in sehr gutem Zustand mit klaren Angaben und gemeinsamer Präsentation für Desktop und Mobile.&#x27;;
        if (cta) cta.setAttribute(&#x27;onclick&#x27;, `openBuyPageById(${car.id})`);
      });
    }


    function updateBusinessStatus() {
      const dot = document.getElementById(&#x27;statusDot&#x27;);
      const text = document.getElementById(&#x27;statusText&#x27;);
      if (!dot || !text) return;

      const now = new Date();
      const berlinParts = new Intl.DateTimeFormat(&#x27;en-GB&#x27;, {
        timeZone: &#x27;Europe/Berlin&#x27;,
        weekday: &#x27;short&#x27;,
        hour: &#x27;2-digit&#x27;,
        minute: &#x27;2-digit&#x27;,
        hour12: false
      }).formatToParts(now);

      const weekdayMap = { Sun: 0, Mon: 1, Tue: 2, Wed: 3, Thu: 4, Fri: 5, Sat: 6 };
      const weekdayNames = {
        0: &#x27;Sonntag&#x27;, 1: &#x27;Montag&#x27;, 2: &#x27;Dienstag&#x27;, 3: &#x27;Mittwoch&#x27;,
        4: &#x27;Donnerstag&#x27;, 5: &#x27;Freitag&#x27;, 6: &#x27;Samstag&#x27;
      };

      const weekdayStr = berlinParts.find((p) =&gt; p.type === &#x27;weekday&#x27;)?.value || &#x27;Sun&#x27;;
      const hour = parseInt(berlinParts.find((p) =&gt; p.type === &#x27;hour&#x27;)?.value || &#x27;0&#x27;, 10);
      const minute = parseInt(berlinParts.find((p) =&gt; p.type === &#x27;minute&#x27;)?.value || &#x27;0&#x27;, 10);

      const day = weekdayMap[weekdayStr];
      const currentMinutes = hour * 60 + minute;
      const openMinutes = 10 * 60;
      const closeMinutes = 18 * 60;

      let message = &#x27;&#x27;;
      let color = &#x27;#ef4444&#x27;;

      if (day &gt;= 1 &amp;&amp; day &lt;= 5) {
        if (currentMinutes &gt;= openMinutes &amp;&amp; currentMinutes &lt; closeMinutes) {
          color = &#x27;#22c55e&#x27;;
          const remaining = closeMinutes - currentMinutes;
          const hoursLeft = Math.floor(remaining / 60);
          const minsLeft = remaining % 60;
          message = hoursLeft &gt; 0
            ? `Jetzt geöffnet • Heute ${weekdayNames[day]} • schließt um 18:00 Uhr • noch ${hoursLeft} Std. und ${minsLeft} Min.`
            : `Jetzt geöffnet • Heute ${weekdayNames[day]} • schließt um 18:00 Uhr • noch ${minsLeft} Min.`;
        } else if (currentMinutes &lt; openMinutes) {
          const remaining = openMinutes - currentMinutes;
          const hoursLeft = Math.floor(remaining / 60);
          const minsLeft = remaining % 60;
          message = `Jetzt geschlossen • Heute ${weekdayNames[day]} • öffnet um 10:00 Uhr • in ${hoursLeft} Std. und ${minsLeft} Min.`;
        } else {
          let nextDay = day + 1;
          while (nextDay === 6 || nextDay === 0) nextDay += 1;
          if (nextDay &gt; 6) nextDay = 1;
          message = `Jetzt geschlossen • Heute ${weekdayNames[day]} • öffnet ${weekdayNames[nextDay]} um 10:00 Uhr`;
        }
      } else if (day === 6) {
        message = &#x27;Jetzt geschlossen • Heute Samstag • öffnet Montag um 10:00 Uhr&#x27;;
      } else {
        message = &#x27;Jetzt geschlossen • Heute Sonntag • öffnet Montag um 10:00 Uhr&#x27;;
      }

      dot.style.background = color;
      dot.style.boxShadow = `0 0 0 4px ${color}22`;
      text.textContent = message;
    }

    function initPage() {
      try {
        if (window.supabase?.createClient) {
          supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }
      } catch (error) {
        console.error(error);
        supabaseClient = null;
      }

      cars = defaultCars;
      initHeroSlider();
      updateBusinessStatus();
      setInterval(updateBusinessStatus, 60000);
      loadCars();

      document.getElementById(&#x27;searchInput&#x27;).addEventListener(&#x27;input&#x27;, () =&gt; {
        currentPage = 1;
        renderInventory();
      });

      document.getElementById(&#x27;categoryFilter&#x27;).addEventListener(&#x27;change&#x27;, () =&gt; {
        currentPage = 1;
        renderInventory();
      });

      document.getElementById(&#x27;prevPageBtn&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        if (currentPage &gt; 1) {
          currentPage--;
          renderInventory();
        }
      });

      document.getElementById(&#x27;nextPageBtn&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        const search = (document.getElementById(&#x27;searchInput&#x27;).value || &#x27;&#x27;).toLowerCase().trim();
        const category = document.getElementById(&#x27;categoryFilter&#x27;).value || &#x27;all&#x27;;
        const filtered = cars.filter((car) =&gt; {
          const searchable = `${car.name || &#x27;&#x27;} ${car.brand || &#x27;&#x27;} ${car.model || &#x27;&#x27;}`.toLowerCase();
          return !car.isHidden &amp;&amp; searchable.includes(search) &amp;&amp; (category === &#x27;all&#x27; || car.category === category);
        });
        const totalPages = Math.max(1, Math.ceil(filtered.length / carsPerPage));
        if (currentPage &lt; totalPages) {
          currentPage++;
          renderInventory();
        }
      });

      document.getElementById(&#x27;buyPage&#x27;).addEventListener(&#x27;click&#x27;, (e) =&gt; {
        if (e.target.id === &#x27;buyPage&#x27;) closeBuyPage();
      });

      document.getElementById(&#x27;buyForm&#x27;).addEventListener(&#x27;submit&#x27;, submitPurchaseRequest);
    }

    if (document.readyState === &#x27;loading&#x27;) {
      document.addEventListener(&#x27;DOMContentLoaded&#x27;, initPage);
    } else {
      initPage();
    }
  &lt;/script&gt;
&lt;/body&gt;
&lt;/html&gt;

    const SUPABASE_URL = &#x27;https://beyxyvibqzhtyawqrhbv.supabase.co&#x27;;
    const SUPABASE_KEY = &#x27;sb_publishable_iMt3G9iAvXawW3QN6vGWjw_BOw8qLFK&#x27;;

      [&#x27;Audi&#x27;, &#x27;RS7&#x27;, &#x27;Sport&#x27;, &#x27;€119,900&#x27;, 2024, &#x27;5,200 km&#x27;, &#x27;Sehr gut&#x27;],
      [&#x27;Range Rover&#x27;, &#x27;Sport&#x27;, &#x27;SUV&#x27;, &#x27;€115,300&#x27;, 2023, &#x27;18,100 km&#x27;, &#x27;Sehr gut&#x27;],
      [&#x27;Porsche&#x27;, &#x27;Taycan&#x27;, &#x27;Sport&#x27;, &#x27;€134,800&#x27;, 2024, &#x27;3,700 km&#x27;, &#x27;Sehr gut&#x27;],
      [&#x27;Lexus&#x27;, &#x27;LX&#x27;, &#x27;SUV&#x27;, &#x27;€92,000&#x27;, 2022, &#x27;21,000 km&#x27;, &#x27;Sehr gut&#x27;],
      [&#x27;Cadillac&#x27;, &#x27;Escalade&#x27;, &#x27;SUV&#x27;, &#x27;€97,000&#x27;, 2021, &#x27;26,000 km&#x27;, &#x27;Sehr gut&#x27;],

      [&#x27;Ferrari&#x27;, &#x27;Roma&#x27;, &#x27;Sport&#x27;, &#x27;€199,000&#x27;, 2022, &#x27;7,400 km&#x27;, &#x27;Sehr gut&#x27;],
      [&#x27;Lamborghini&#x27;, &#x27;Urus&#x27;, &#x27;SUV&#x27;, &#x27;€239,000&#x27;, 2023, &#x27;6,900 km&#x27;, &#x27;Sehr gut&#x27;]
    ];

    const defaultCars = carSeed.map((item, index) =&gt; ({
      id: index + 1,
      brand: item[0],
      model: item[1],
      category: item[2],
      price: item[3],
      year: item[4],
      mileage: item[5],
      condition: item[6],
      name: `${item[0]} ${item[1]}`,
      description: &#x27;Fahrzeug in sehr gutem Zustand mit klaren Angaben und sauberer mobiler Darstellung.&#x27;,
      image: heroStockImages[index % heroStockImages.length],
      gallery: [heroStockImages[index % heroStockImages.length]],
      isHidden: false
    }));

    function getPublicImage(value) {
      if (!value || typeof value !== &#x27;string&#x27;) return &#x27;&#x27;;
      const trimmed = value.trim();
      if (!trimmed) return &#x27;&#x27;;
      if (/^https?:\/\//i.test(trimmed) || trimmed.startsWith(&#x27;data:&#x27;)) return trimmed;
      const cleanPath = decodeURIComponent(trimmed)
        .replace(/^\/+/, &#x27;&#x27;)
        .replace(new RegExp(`^storage/v1/object/public/${STORAGE_BUCKET}/`), &#x27;&#x27;)
        .replace(new RegExp(`^${STORAGE_BUCKET}/`), &#x27;&#x27;);
      if (!supabaseClient) return `${imageBase}/${cleanPath}`;
      const { data } = supabaseClient.storage.from(STORAGE_BUCKET).getPublicUrl(cleanPath);
      return data?.publicUrl || `${imageBase}/${cleanPath}`;
    }

    function normalizeGallery(row, fallbackImage) {
      let gallery = [];
      if (Array.isArray(row.gallery)) gallery = row.gallery;
      else if (typeof row.gallery === &#x27;string&#x27; &amp;&amp; row.gallery.trim()) {
        try {
          const parsed = JSON.parse(row.gallery);
          gallery = Array.isArray(parsed) ? parsed : [row.gallery];
        } catch {
          gallery = [row.gallery];
        }
      }
      const normalized = gallery.map(getPublicImage).filter(Boolean);
      const mainImage = getPublicImage(row.image) || fallbackImage;
      if (mainImage &amp;&amp; !normalized.includes(mainImage)) normalized.unshift(mainImage);
      return normalized.length ? normalized : [fallbackImage];
    }

    function findCarById(id) {
      return cars.find((car) =&gt; String(car.id) === String(id));
    }

    function createCarsSignature(rows) {
      return JSON.stringify((rows || []).map((row, index) =&gt; ({
        id: row?.id ?? index + 1,
        image: row?.image || &#x27;&#x27;,
        updatedAt: row?.updated_at || row?.updatedAt || &#x27;&#x27;
      })));
    }

    function createCarCard(car) {
      return `
        &lt;article class=&quot;car-card&quot;&gt;
          &lt;div class=&quot;car-image-wrap&quot;&gt;
            &lt;img class=&quot;car-image&quot; src=&quot;${car.image || window.placeholderCar}&quot; alt=&quot;${car.name}&quot; onerror=&quot;this.onerror=null;this.src=window.placeholderCar&quot;&gt;
            &lt;div class=&quot;car-id&quot;&gt;#${car.id}&lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;car-body&quot;&gt;
            &lt;div class=&quot;car-price&quot;&gt;${car.price || &#x27;&#x27;}&lt;/div&gt;
            &lt;h3 class=&quot;car-name&quot;&gt;${car.name || &#x27;&#x27;}&lt;/h3&gt;
            &lt;div class=&quot;car-category&quot;&gt;${car.category || &#x27;&#x27;}&lt;/div&gt;

            &lt;div class=&quot;car-detail-row&quot;&gt;
              &lt;div class=&quot;detail-box&quot;&gt;&lt;span&gt;Baujahr&lt;/span&gt;&lt;strong&gt;${car.year || &#x27;&#x27;}&lt;/strong&gt;&lt;/div&gt;
              &lt;div class=&quot;detail-box&quot;&gt;&lt;span&gt;Kilometer&lt;/span&gt;&lt;strong&gt;${car.mileage || &#x27;&#x27;}&lt;/strong&gt;&lt;/div&gt;
              &lt;div class=&quot;detail-box&quot;&gt;&lt;span&gt;Zustand&lt;/span&gt;&lt;strong&gt;${car.condition || &#x27;&#x27;}&lt;/strong&gt;&lt;/div&gt;
              &lt;div class=&quot;detail-box&quot;&gt;&lt;span&gt;Marke&lt;/span&gt;&lt;strong&gt;${car.brand || &#x27;&#x27;}&lt;/strong&gt;&lt;/div&gt;
            &lt;/div&gt;

            &lt;div class=&quot;car-actions&quot;&gt;
              &lt;button class=&quot;btn-primary&quot; type=&quot;button&quot; onclick=&quot;openBuyPageById(${car.id})&quot;&gt;Jetzt anfragen&lt;/button&gt;
            &lt;/div&gt;
          &lt;/div&gt;
        &lt;/article&gt;
      `;
    }

    function renderInventory() {
      const inventory = document.getElementById(&#x27;inventoryCars&#x27;);
      const search = (document.getElementById(&#x27;searchInput&#x27;)?.value || &#x27;&#x27;).toLowerCase().trim();
      const category = document.getElementById(&#x27;categoryFilter&#x27;)?.value || &#x27;all&#x27;;

      const filtered = cars.filter((car) =&gt; {
        const searchable = `${car.name || &#x27;&#x27;} ${car.brand || &#x27;&#x27;} ${car.model || &#x27;&#x27;}`.toLowerCase();
        return !car.isHidden &amp;&amp; searchable.includes(search) &amp;&amp; (category === &#x27;all&#x27; || car.category === category);
      });

      const totalPages = Math.max(1, Math.ceil(filtered.length / carsPerPage));
      if (currentPage &gt; totalPages) currentPage = totalPages;
      const start = (currentPage - 1) * carsPerPage;
      const pageCars = filtered.slice(start, start + carsPerPage);

      inventory.innerHTML = pageCars.length ? pageCars.map(createCarCard).join(&#x27;&#x27;) : &#x27;&lt;div class=&quot;info-card&quot;&gt;Aktuell gibt es keine passenden Fahrzeuge.&lt;/div&gt;&#x27;;

      document.getElementById(&#x27;pagerInfo&#x27;).textContent = `Seite ${currentPage} von ${totalPages}`;
      document.getElementById(&#x27;prevPageBtn&#x27;).disabled = currentPage === 1;
      document.getElementById(&#x27;nextPageBtn&#x27;).disabled = currentPage === totalPages;

      syncHeroSlidesWithCars();
    }

    async function loadCars() {
      if (!supabaseClient) {
        cars = defaultCars;
        renderInventory();
        return;
      }

      try {
        const { data, error } = await supabaseClient.from(&#x27;cars&#x27;).select(&#x27;*&#x27;).order(&#x27;id&#x27;, { ascending: true });
        if (error) throw error;

        const rows = Array.isArray(data) ? data : [];
        const signature = createCarsSignature(rows);
        if (signature === lastCarsSignature &amp;&amp; cars.length) return;
        lastCarsSignature = signature;

        if (!rows.length) {
          cars = defaultCars;
          renderInventory();
          return;
        }

        cars = rows.map((row, index) =&gt; {
          const normalizedImage = getPublicImage(row.image) || heroStockImages[index % heroStockImages.length] || window.placeholderCar;
          return {
            ...row,
            id: row.id ?? index + 1,
            name: row.name || `${row.brand || &#x27;&#x27;} ${row.model || &#x27;&#x27;}`.trim() || `Fahrzeug ${index + 1}`,
            image: normalizedImage,
            gallery: normalizeGallery(row, normalizedImage),
            isHidden: Boolean(row.isHidden || row.ishidden || row.is_hidden)
          };
        });

        renderInventory();
      } catch (error) {
        console.error(error);
        cars = defaultCars;
        renderInventory();
      }
    }

    function openBuyPage(car) {
      const page = document.getElementById(&#x27;buyPage&#x27;);
      document.getElementById(&#x27;buyCarId&#x27;).value = car.id || &#x27;&#x27;;

      document.getElementById(&#x27;buyCarPrice&#x27;).value = car.price || &#x27;&#x27;;
      document.getElementById(&#x27;buyCarNameDisplay&#x27;).textContent = car.name || &#x27;Fahrzeug&#x27;;
      document.getElementById(&#x27;buyCarInfoDisplay&#x27;).textContent = `${car.price || &#x27;&#x27;} • ${car.year || &#x27;&#x27;} • ${car.mileage || &#x27;&#x27;} • ${car.condition || &#x27;&#x27;}`;
      document.getElementById(&#x27;buyFormMessage&#x27;).textContent = &#x27;Bereit zum Senden.&#x27;;
      page.classList.add(&#x27;show&#x27;);
      page.scrollTop = 0;
    }

    function openBuyPageById(id) {
      const car = findCarById(id);

      document.getElementById(&#x27;buyPage&#x27;).classList.remove(&#x27;show&#x27;);

    window.openBuyPageById = openBuyPageById;

    async function submitPurchaseRequest(event) {
      event.preventDefault();
      const msg = document.getElementById(&#x27;buyFormMessage&#x27;);

      const payload = {
        car_id: document.getElementById(&#x27;buyCarId&#x27;).value || null,
        car_name: document.getElementById(&#x27;buyCarName&#x27;).value.trim(),
        car_price: document.getElementById(&#x27;buyCarPrice&#x27;).value.trim(),
        buyer_name: document.getElementById(&#x27;buyerName&#x27;).value.trim(),
        buyer_phone: document.getElementById(&#x27;buyerPhone&#x27;).value.trim(),
        buyer_email: document.getElementById(&#x27;buyerEmail&#x27;).value.trim(),
        buyer_address: document.getElementById(&#x27;buyerAddress&#x27;).value.trim(),
        payment_method: document.getElementById(&#x27;paymentMethod&#x27;).value,
        visit_date: document.getElementById(&#x27;visitDate&#x27;).value || null,
        notes: document.getElementById(&#x27;buyerNotes&#x27;).value.trim(),
        request_status: &#x27;new&#x27;,
        payment_status: &#x27;pending&#x27;
      };

      if (!payload.buyer_name || !payload.buyer_phone || !payload.buyer_email || !payload.payment_method) {
        msg.textContent = &#x27;Bitte füllen Sie alle Pflichtfelder aus.&#x27;;
        msg.style.color = &#x27;#b91c1c&#x27;;
        return;
      }

      if (!supabaseClient) {
        msg.textContent = &#x27;Datenbankverbindung ist nicht verfügbar.&#x27;;
        msg.style.color = &#x27;#b91c1c&#x27;;
        return;
      }

      try {
        msg.textContent = &#x27;Anfrage wird gespeichert...&#x27;;
        msg.style.color = &#x27;#6b7280&#x27;;
        const { error } = await supabaseClient.from(&#x27;car_purchase_requests&#x27;).insert([payload]);
        if (error) throw error;
        msg.textContent = &#x27;Ihre Anfrage wurde erfolgreich gesendet.&#x27;;
        msg.style.color = &#x27;#166534&#x27;;
        document.getElementById(&#x27;buyForm&#x27;).reset();
      } catch (error) {
        msg.textContent = error.message || &#x27;Fehler beim Speichern der Anfrage.&#x27;;
        msg.style.color = &#x27;#b91c1c&#x27;;
      }
    }

    function initHeroSlider() {
      const slider = document.getElementById(&#x27;heroSlider&#x27;);
      const slides = Array.from(slider.querySelectorAll(&#x27;.hero-slide&#x27;));
      const dots = Array.from(document.querySelectorAll(&#x27;.hero-dot&#x27;));
      const prev = document.getElementById(&#x27;heroPrev&#x27;);
      const next = document.getElementById(&#x27;heroNext&#x27;);
      let current = 0;
      let timer = null;
      let touchStartX = 0;
      let touchEndX = 0;

      const showSlide = (index) =&gt; {
        current = (index + slides.length) % slides.length;
        slides.forEach((slide, i) =&gt; slide.classList.toggle(&#x27;active&#x27;, i === current));
        dots.forEach((dot, i) =&gt; dot.classList.toggle(&#x27;active&#x27;, i === current));
      };

      const stop = () =&gt; {
        if (timer) clearInterval(timer);
        timer = null;
      };

      const start = () =&gt; {
        stop();
        timer = setInterval(() =&gt; showSlide(current + 1), 5000);
      };

      prev.addEventListener(&#x27;click&#x27;, () =&gt; { showSlide(current - 1); start(); });
      next.addEventListener(&#x27;click&#x27;, () =&gt; { showSlide(current + 1); start(); });
      dots.forEach((dot, i) =&gt; dot.addEventListener(&#x27;click&#x27;, () =&gt; { showSlide(i); start(); }));

      slider.addEventListener(&#x27;touchstart&#x27;, (e) =&gt; {
        touchStartX = e.changedTouches[0].clientX;
        stop();
      }, { passive: true });

      slider.addEventListener(&#x27;touchend&#x27;, (e) =&gt; {
        touchEndX = e.changedTouches[0].clientX;
        const delta = touchEndX - touchStartX;
        if (Math.abs(delta) &gt; 40) {
          if (delta &lt; 0) showSlide(current + 1);
          else showSlide(current - 1);
        }
        start();
      }, { passive: true });

      showSlide(0);
      start();

      window.heroSliderApi = { showSlide };
    }

    function syncHeroSlidesWithCars() {
      const slides = Array.from(document.querySelectorAll(&#x27;.hero-slide&#x27;));
      const visibleCars = cars.filter((car) =&gt; !car.isHidden).slice(0, 3);
      if (!visibleCars.length) return;

      slides.forEach((slide, index) =&gt; {
        const car = visibleCars[index];
        if (!car) return;

        const img = slide.querySelector(&#x27;img&#x27;);
        const kicker = slide.querySelector(&#x27;.hero-kicker&#x27;);
        const title = slide.querySelector(&#x27;.hero-title&#x27;);
        const detailWrap = slide.querySelector(&#x27;.hero-details&#x27;);
        const desc = slide.querySelector(&#x27;.hero-desc&#x27;);
        const cta = slide.querySelector(&#x27;.hero-cta&#x27;);

        if (img) {
          img.src = car.image || car.gallery?.[0] || heroStockImages[index % heroStockImages.length];
          img.alt = car.name || &#x27;car&#x27;;
        }
        if (kicker) kicker.textContent = car.category || &#x27;Premium Auswahl&#x27;;
        if (title) {
          const words = String(car.name || &#x27;&#x27;).split(/\s+/);
          if (words.length &gt;= 2) title.innerHTML = `${words[0]}&lt;br&gt;${words.slice(1).join(&#x27; &#x27;)}`;
          else title.textContent = car.name || &#x27;&#x27;;
        }
        if (detailWrap) {
          detailWrap.innerHTML = `
            ${car.year ? `&lt;span&gt;${car.year}&lt;/span&gt;` : &#x27;&#x27;}
            ${car.mileage ? `&lt;span&gt;${car.mileage}&lt;/span&gt;` : &#x27;&#x27;}
            ${car.condition ? `&lt;span&gt;${car.condition}&lt;/span&gt;` : &#x27;&#x27;}
          `;
        }
        if (desc) desc.textContent = car.description || &#x27;Fahrzeug in sehr gutem Zustand mit klaren Angaben und sauberer mobiler Darstellung.&#x27;;
        if (cta) cta.setAttribute(&#x27;onclick&#x27;, `openBuyPageById(${car.id})`);
      });
    }


    function updateBusinessStatus() {
      const dot = document.getElementById(&#x27;statusDot&#x27;);
      const text = document.getElementById(&#x27;statusText&#x27;);
      if (!dot || !text) return;

      const now = new Date();
      const berlinParts = new Intl.DateTimeFormat(&#x27;en-GB&#x27;, {
        timeZone: &#x27;Europe/Berlin&#x27;,
        weekday: &#x27;short&#x27;,
        hour: &#x27;2-digit&#x27;,
        minute: &#x27;2-digit&#x27;,
        hour12: false
      }).formatToParts(now);

      const weekdayMap = { Sun: 0, Mon: 1, Tue: 2, Wed: 3, Thu: 4, Fri: 5, Sat: 6 };
      const weekdayNames = {
        0: &#x27;Sonntag&#x27;, 1: &#x27;Montag&#x27;, 2: &#x27;Dienstag&#x27;, 3: &#x27;Mittwoch&#x27;,
        4: &#x27;Donnerstag&#x27;, 5: &#x27;Freitag&#x27;, 6: &#x27;Samstag&#x27;
      };

      const weekdayStr = berlinParts.find((p) =&gt; p.type === &#x27;weekday&#x27;)?.value || &#x27;Sun&#x27;;
      const hour = parseInt(berlinParts.find((p) =&gt; p.type === &#x27;hour&#x27;)?.value || &#x27;0&#x27;, 10);
      const minute = parseInt(berlinParts.find((p) =&gt; p.type === &#x27;minute&#x27;)?.value || &#x27;0&#x27;, 10);

      const day = weekdayMap[weekdayStr];
      const currentMinutes = hour * 60 + minute;
      const openMinutes = 10 * 60;
      const closeMinutes = 18 * 60;

      let message = &#x27;&#x27;;
      let color = &#x27;#ef4444&#x27;;

      if (day &gt;= 1 &amp;&amp; day &lt;= 5) {
        if (currentMinutes &gt;= openMinutes &amp;&amp; currentMinutes &lt; closeMinutes) {
          color = &#x27;#22c55e&#x27;;
          const remaining = closeMinutes - currentMinutes;
          const hoursLeft = Math.floor(remaining / 60);
          const minsLeft = remaining % 60;
          message = hoursLeft &gt; 0
            ? `Jetzt geöffnet • Heute ${weekdayNames[day]} • schließt um 18:00 Uhr • noch ${hoursLeft} Std. und ${minsLeft} Min.`
            : `Jetzt geöffnet • Heute ${weekdayNames[day]} • schließt um 18:00 Uhr • noch ${minsLeft} Min.`;
        } else if (currentMinutes &lt; openMinutes) {
          const remaining = openMinutes - currentMinutes;
          const hoursLeft = Math.floor(remaining / 60);
          const minsLeft = remaining % 60;
          message = `Jetzt geschlossen • Heute ${weekdayNames[day]} • öffnet um 10:00 Uhr • in ${hoursLeft} Std. und ${minsLeft} Min.`;
        } else {
          let nextDay = day + 1;
          while (nextDay === 6 || nextDay === 0) nextDay += 1;
          if (nextDay &gt; 6) nextDay = 1;
          message = `Jetzt geschlossen • Heute ${weekdayNames[day]} • öffnet ${weekdayNames[nextDay]} um 10:00 Uhr`;
        }
      } else if (day === 6) {
        message = &#x27;Jetzt geschlossen • Heute Samstag • öffnet Montag um 10:00 Uhr&#x27;;
      } else {
        message = &#x27;Jetzt geschlossen • Heute Sonntag • öffnet Montag um 10:00 Uhr&#x27;;
      }

      dot.style.background = color;
      dot.style.boxShadow = `0 0 0 4px ${color}22`;
      text.textContent = message;
    }

    function initPage() {
      try {
        if (window.supabase?.createClient) {
          supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }
      } catch (error) {
        console.error(error);
        supabaseClient = null;
      }

      cars = defaultCars;
      initHeroSlider();
      updateBusinessStatus();
      setInterval(updateBusinessStatus, 60000);
      loadCars();

      document.getElementById(&#x27;searchInput&#x27;).addEventListener(&#x27;input&#x27;, () =&gt; {
        currentPage = 1;
        renderInventory();
      });

      document.getElementById(&#x27;categoryFilter&#x27;).addEventListener(&#x27;change&#x27;, () =&gt; {
        currentPage = 1;
        renderInventory();
      });

      document.getElementById(&#x27;prevPageBtn&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        if (currentPage &gt; 1) {
          currentPage--;
          renderInventory();
        }
      });

      document.getElementById(&#x27;nextPageBtn&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        const search = (document.getElementById(&#x27;searchInput&#x27;).value || &#x27;&#x27;).toLowerCase().trim();
        const category = document.getElementById(&#x27;categoryFilter&#x27;).value || &#x27;all&#x27;;
        const filtered = cars.filter((car) =&gt; {
          const searchable = `${car.name || &#x27;&#x27;} ${car.brand || &#x27;&#x27;} ${car.model || &#x27;&#x27;}`.toLowerCase();
          return !car.isHidden &amp;&amp; searchable.includes(search) &amp;&amp; (category === &#x27;all&#x27; || car.category === category);
        });
        const totalPages = Math.max(1, Math.ceil(filtered.length / carsPerPage));
        if (currentPage &lt; totalPages) {
          currentPage++;
          renderInventory();
        }
      });

      document.getElementById(&#x27;buyPage&#x27;).addEventListener(&#x27;click&#x27;, (e) =&gt; {
        if (e.target.id === &#x27;buyPage&#x27;) closeBuyPage();
      });

      document.getElementById(&#x27;buyForm&#x27;).addEventListener(&#x27;submit&#x27;, submitPurchaseRequest);
    }

    if (document.readyState === &#x27;loading&#x27;) {
      document.addEventListener(&#x27;DOMContentLoaded&#x27;, initPage);
    } else {
      initPage();
    }
  &lt;/script&gt;
&lt;/body&gt;
&lt;/html&gt;
"></iframe>

  <script>
    function resizeFrame(frame) {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        if (!doc) return;
        const setHeight = () => {
          const body = doc.body;
          const html = doc.documentElement;
          const h = Math.max(
            body ? body.scrollHeight : 0,
            body ? body.offsetHeight : 0,
            html ? html.clientHeight : 0,
            html ? html.scrollHeight : 0,
            html ? html.offsetHeight : 0
          );
          frame.style.height = h + 'px';
        };
        setHeight();
        frame.contentWindow.addEventListener('load', setHeight);
        new ResizeObserver(setHeight).observe(doc.documentElement);
        if (doc.fonts && doc.fonts.ready) doc.fonts.ready.then(setHeight).catch(() => {});
        setTimeout(setHeight, 300);
        setTimeout(setHeight, 1000);
      } catch (e) {
        frame.style.height = '100vh';
      }
    }

    function init() {
      const desktopFrame = document.getElementById('desktopFrame');
      const mobileFrame = document.getElementById('mobileFrame');
      desktopFrame.addEventListener('load', () => resizeFrame(desktopFrame));
      mobileFrame.addEventListener('load', () => resizeFrame(mobileFrame));
      resizeFrame(desktopFrame);
      resizeFrame(mobileFrame);
    }

    window.addEventListener('load', init);
    window.addEventListener('resize', () => {
      const desktopFrame = document.getElementById('desktopFrame');
      const mobileFrame = document.getElementById('mobileFrame');
      resizeFrame(desktopFrame);
      resizeFrame(mobileFrame);
    });
  </script>
