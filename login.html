<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">document.getElementById('loginBtn').addEventListener('click', login);
document.getElementById('password').addEventListener('keydown', (e) => {
if (e.key === 'Enter') login();
});
showMessage('أدخل بيانات الدخول.','success');
</script>
<style>
body{
margin:0;
font-family:'Tajawal';
background:linear-gradient(135deg,#020617,#0b1f3a,#000);
color:#fff;
}
.container{
max-width:800px;
margin:80px auto;
padding:20px;
}
.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:25px;
padding:30px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}
.top{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:20px;
}
.top img{
width:140px;
height:90px;
border-radius:16px;
object-fit:cover;
border:1px solid rgba(255,255,255,0.12);
background:rgba(255,255,255,0.06);
padding:6px;
}
.back{
background:#111;
padding:10px 15px;
border-radius:10px;
text-decoration:none;
color:#fff;
}
h1{
margin:0 0 20px;
font-size:28px;
}
input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:14px;
border:1px solid rgba(255,255,255,0.1);
background:#020617;
color:#fff;
outline:none;
transition:border-color .2s ease, box-shadow .2s ease;
}
input:focus{
border-color:rgba(59,130,246,.6);
box-shadow:0 0 0 3px rgba(59,130,246,.12);
}
button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
background:#22c55e;
font-weight:bold;
cursor:pointer;
}
#msg{
margin-top:12px;
padding:12px 14px;
border-radius:12px;
font-size:14px;
display:block;
line-height:1.7;
min-height:48px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
color:#cbd5e1;
}
#msg.error{
background:rgba(239,68,68,.12);
border:1px solid rgba(239,68,68,.28);
color:#fecaca;
}
#msg.success{
background:rgba(34,197,94,.12);
border:1px solid rgba(34,197,94,.28);
color:#bbf7d0;
}
</style>
</head>
<body>

<div class="container">

<div class="card">

<div class="top">
<a href="index.html" class="back">رجوع</a>
<img src="images/logo.png">
</div>

<h1>تسجيل الدخول</h1>

<input id="email" type="email" placeholder="البريد الإلكتروني">
<input id="password" type="password" placeholder="كلمة المرور">

<button id="loginBtn" type="button">تسجيل الدخول</button>

<p id="msg"></p>

</div>

</div>

<script>
const supabase = window.supabase.createClient(
'https://beyxyvibqzhtyawqrhbv.supabase.co',
'sb_publishable_iMt3G9iAvXawW3QN6vGWjw_BOw8qLFK'
);

function showMessage(text,type='error'){
const msg=document.getElementById('msg');
msg.className=type;
msg.innerText=text;
}

function clearMessage(){
const msg=document.getElementById('msg');
msg.className='';
msg.innerText='';
}

async function login(){
const email=document.getElementById('email').value.trim();
const password=document.getElementById('password').value;
const btn=document.getElementById('loginBtn');

clearMessage();

if(!email || !password){
showMessage('يرجى إدخال البريد الإلكتروني وكلمة المرور.');
return;
}

btn.disabled=true;
btn.innerText='جاري الدخول...';

try{
const { data, error } = await supabase.auth.signInWithPassword({ email, password });

if(error){
showMessage('خطأ: ' + (error.message || 'تعذر تسجيل الدخول'));
btn.disabled=false;
btn.innerText='تسجيل الدخول';
return;
}

showMessage('تم تسجيل الدخول بنجاح.','success');
console.log('login success', data);
setTimeout(()=>{
window.location.href='index.html';
},1000);
}catch(e){
showMessage('تعذر تسجيل الدخول حالياً: ' + (e.message || 'خطأ غير معروف'));
btn.disabled=false;
btn.innerText='تسجيل الدخول';
}
}

try{
const { error } = await supabase.auth.signInWithPassword({ email, password });

if(error){
if(error.message && error.message.toLowerCase().includes('invalid login credentials')){
showMessage('البريد الإلكتروني أو كلمة المرور غير صحيحة.');
}else if(error.message && error.message.toLowerCase().includes('email not confirmed')){
showMessage('هذا البريد الإلكتروني غير مؤكد بعد.');
}else{
showMessage(error.message || 'حدث خطأ أثناء تسجيل الدخول.');
}
return;
}

showMessage('تم تسجيل الدخول بنجاح.','success');
setTimeout(()=>{
window.location.href='index.html';
},700);
}catch(e){
showMessage('تعذر تسجيل الدخول حالياً، حاول مرة أخرى.');
}
}
</script>

</body>
</html>
