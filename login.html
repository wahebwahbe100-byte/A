<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#000;color:#fff;font-family:Arial;text-align:center;padding:50px}
input{display:block;margin:10px auto;padding:10px;width:250px}
button{padding:10px 20px;background:green;color:#fff;border:none}
</style>
</head>

<body>

<h2>تسجيل الدخول</h2>

<input id="email" placeholder="البريد">
<input id="password" type="password" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>

<p id="msg"></p>

<script>
const supabase = window.supabase.createClient(
'https://beyxyvibqzhtyawqrhbv.supabase.co',
'sb_publishable_iMt3G9iAvXawW3QN6vGWjw_BOw8qLFK'
);

async function login(){
const email = document.getElementById('email').value;
const password = document.getElementById('password').value;

const {error} = await supabase.auth.signInWithPassword({email,password});

if(error){
document.getElementById('msg').innerText = error.message;
}else{
window.location = 'dashboard.html';
}
}
</script>

</body>
</html>
