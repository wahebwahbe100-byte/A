<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'Tajawal',sans-serif;
      background:linear-gradient(135deg,#020617,#0b1f3a,#000);
      color:#fff;
      min-height:100vh;
    }
    .container{
      max-width:820px;
      margin:80px auto;
      padding:20px;
    }
    .card{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.1);
      border-radius:26px;
      padding:30px;
      box-shadow:0 20px 60px rgba(0,0,0,.6);
    }
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:20px;
    }
    .top img{
      width:140px;
      height:90px;
      border-radius:16px;
      object-fit:cover;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      padding:6px;
    }
    .back{
      background:rgba(255,255,255,.08);
      padding:10px 15px;
      border-radius:12px;
      text-decoration:none;
      color:#fff;
      font-weight:700;
      border:1px solid rgba(255,255,255,.1);
    }
    h1{
      margin:0 0 24px;
      font-size:34px;
    }
    .field{
      margin-bottom:14px;
    }
    input{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.1);
      background:#020617;
      color:#fff;
      outline:none;
      font-family:inherit;
      font-size:16px;
    }
    input:focus{
      border-color:rgba(59,130,246,.6);
      box-shadow:0 0 0 3px rgba(59,130,246,.12);
    }
    button{
      width:100%;
      padding:14px;
      margin-top:8px;
      border:none;
      border-radius:14px;
      background:#22c55e;
      color:#04111f;
      font-weight:800;
      font-family:inherit;
      font-size:18px;
      cursor:pointer;
    }
    button:disabled{opacity:.65;cursor:not-allowed}
    #msg{
      margin-top:14px;
      min-height:24px;
      padding:12px 14px;
      border-radius:12px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      color:#cbd5e1;
      line-height:1.7;
      white-space:pre-wrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="top">
        <a href="index.html" class="back">رجوع</a>
        <img src="images/logo.png" alt="logo" onerror="this.style.display='none'">
      </div>

      <h1>تسجيل الدخول</h1>

      <div class="field">
        <input id="email" type="email" placeholder="البريد الإلكتروني">
      </div>

      <div class="field">
        <input id="password" type="password" placeholder="كلمة المرور">
      </div>

      <button id="loginBtn" type="button" onclick="login()">تسجيل الدخول</button>

      <div id="msg">أدخل بيانات الدخول.</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://beyxyvibqzhtyawqrhbv.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_iMt3G9iAvXawW3QN6vGWjw_BOw8qLFK';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showMessage(text, ok = false) {
      const msg = document.getElementById('msg');
      msg.textContent = text;
      msg.style.color = ok ? '#bbf7d0' : '#fecaca';
      msg.style.borderColor = ok ? 'rgba(34,197,94,.28)' : 'rgba(239,68,68,.28)';
      msg.style.background = ok ? 'rgba(34,197,94,.12)' : 'rgba(239,68,68,.12)';
    }

    function showNeutral(text) {
      const msg = document.getElementById('msg');
      msg.textContent = text;
      msg.style.color = '#cbd5e1';
      msg.style.borderColor = 'rgba(255,255,255,.08)';
      msg.style.background = 'rgba(255,255,255,.04)';
    }

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');

      if (!email || !password) {
        showMessage('يرجى إدخال البريد الإلكتروني وكلمة المرور.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'جاري الدخول...';
      showNeutral('يتم الآن التحقق من بيانات الدخول...');

      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });

        if (error) {
          showMessage(error.message || 'تعذر تسجيل الدخول.');
          btn.disabled = false;
          btn.textContent = 'تسجيل الدخول';
          return;
        }

        if (!data || !data.user) {
          showMessage('لم يتم إنشاء جلسة دخول.');
          btn.disabled = false;
          btn.textContent = 'تسجيل الدخول';
          return;
        }

        showMessage('تم تسجيل الدخول بنجاح، سيتم تحويلك الآن.', true);
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 900);
      } catch (err) {
        showMessage('حدث خطأ غير متوقع: ' + (err.message || 'Unknown error'));
        btn.disabled = false;
        btn.textContent = 'تسجيل الدخول';
      }
    }

    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
