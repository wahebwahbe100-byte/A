<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anmeldung</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', Arial, sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 20%, rgba(59,130,246,.20), transparent 30%),
        radial-gradient(circle at 80% 0%, rgba(255,255,255,.07), transparent 25%),
        linear-gradient(135deg, #020617 0%, #0b1f3a 50%, #000000 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .shell {
      width: min(1100px, 100%);
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 28px;
    }
    .panel, .login-card {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 30px;
      box-shadow: 0 24px 70px rgba(0,0,0,.45);
      backdrop-filter: blur(12px);
    }
    .panel { padding: 34px; }
    .login-card { padding: 34px; }

    .submit-btn {
      margin-top: 6px;
      border: none;
      border-radius: 18px;
      background: #22c55e;
      color: #04111f;
      padding: 16px;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
    }

    .message {
      margin-top: 16px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.04);
      color: #cbd5e1;
    }
  </style>
</head>

<body>

<section class="login-card">

  <h2>Admin Login</h2>

  <input id="email" type="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>

  <button id="loginBtn" class="submit-btn" onclick="loginHandler()">Login</button>

  <div id="msg" class="message">Bereit...</div>

</section>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = 'https://mbesnbkludynomgdzfhw.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_EfwicNkVNrNBXKBgoiMXjA_VqTcfnTm';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const msg = document.getElementById('msg');
const btn = document.getElementById('loginBtn');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');

function show(text, ok=false){
  msg.textContent = text;
  msg.style.color = ok ? '#22c55e' : '#f87171';
}

// 🔐 تحقق admin
async function isAdmin(id){
  const { data } = await supabase
    .from('admin_users')
    .select('*')
    .eq('user_id', id)
    .maybeSingle();

  return !!data;
}

// 🚀 تسجيل الدخول
async function loginHandler(){
  const email = emailInput.value;
  const password = passwordInput.value;

  if(!email || !password){
    show("Fill all fields");
    return;
  }

  btn.disabled = true;

  try{
    const { data, error } = await supabase.auth.signInWithPassword({
      email, password
    });

    if(error) throw error;

    const ok = await isAdmin(data.user.id);

    if(!ok){
      await supabase.auth.signOut();
      throw new Error("Not admin");
    }

    show("Success", true);

    setTimeout(()=>{
      window.location.href = "dashboard.html";
    }, 500);

  }catch(e){
    show(e.message);
  }

  btn.disabled = false;
}

window.loginHandler = loginHandler;

</script>

</body>
</html>
