<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;font-family:'Tajawal';background:#020617;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh}
.box{background:#0f172a;padding:30px;border-radius:20px;width:350px;text-align:center}
input{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #333;background:#020617;color:#fff}
button{width:100%;padding:12px;background:#22c55e;border:none;border-radius:10px;font-weight:bold;cursor:pointer}
</style>
</head>
<body>
<div style="position:absolute;top:20px;right:20px;display:flex;align-items:center;gap:10px">
<img src="images/logo.png" style="width:50px;height:50px;border-radius:10px">
<a href="index.html" style="color:white;text-decoration:none;background:#111;padding:8px 12px;border-radius:10px">رجوع</a>
</div>

<div class="box">
<h2>تسجيل الدخول</h2>
<input id="email" type="email" placeholder="البريد الإلكتروني">
<input id="password" type="password" placeholder="كلمة المرور">
<button onclick="login()">دخول</button>
<p id="msg"></p>
</div>

<script>
const supabase = window.supabase.createClient(
'https://beyxyvibqzhtyawqrhbv.supabase.co',
'sb_publishable_iMt3G9iAvXawW3QN6vGWjw_BOw8qLFK'
);

async function login(){
const email=document.getElementById('email').value;
const password=document.getElementById('password').value;
const {data,error}=await supabase.auth.signInWithPassword({email,password});

if(error){
document.getElementById('msg').innerText='خطأ في تسجيل الدخول';
}else{
document.getElementById('msg').innerText='تم الدخول';
window.location.href='index.html';
}
}
</script>
</body>
</html>
