<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{
margin:0;
font-family:'Tajawal';
background:linear-gradient(135deg,#020617,#0b1f3a,#000);
color:#fff;
}
.container{
max-width:800px;
margin:80px auto;
padding:20px;
}
.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:25px;
padding:30px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}
.top{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:20px;
}
.top img{
width:80px;
border-radius:15px;
}
.back{
background:#111;
padding:10px 15px;
border-radius:10px;
text-decoration:none;
color:#fff;
}
h1{
margin:0 0 20px;
font-size:28px;
}
input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:14px;
border:1px solid rgba(255,255,255,0.1);
background:#020617;
color:#fff;
}
button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
background:#22c55e;
font-weight:bold;
cursor:pointer;
}
#msg{margin-top:10px}
</style>
</head>
<body>

<div class="container">

<div class="card">

<div class="top">
<a href="index.html" class="back">رجوع</a>
<img src="images/logo.png">
</div>

<h1>تسجيل الدخول</h1>

<input id="email" type="email" placeholder="">
<input id="password" type="password" placeholder="كلمة المرور">

<button onclick="login()">تسجيل الدخول</button>

<p id="msg"></p>

</div>

</div>

<script>
const supabase = window.supabase.createClient(
'https://beyxyvibqzhtyawqrhbv.supabase.co',
'sb_publishable_iMt3G9iAvXawW3QN6vGWjw_BOw8qLFK'
);

async function login(){
const email=document.getElementById('email').value;
const password=document.getElementById('password').value;

const {data,error}=await supabase.auth.signInWithPassword({email,password});

if(error){
document.getElementById('msg').innerText='خطأ في تسجيل الدخول';
}else{
window.location.href='index.html';
}
}
</script>

</body>
</html>
