<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anmeldung</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', Arial, sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 20%, rgba(59,130,246,.20), transparent 30%),
        radial-gradient(circle at 80% 0%, rgba(255,255,255,.07), transparent 25%),
        linear-gradient(135deg, #020617 0%, #0b1f3a 50%, #000000 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .shell {
      width: min(1100px, 100%);
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 28px;
      align-items: stretch;
    }
    .panel, .login-card {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 30px;
      box-shadow: 0 24px 70px rgba(0,0,0,.45);
      backdrop-filter: blur(12px);
    }
    .panel {
      padding: 34px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 22px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo {
      width: 110px;
      height: 74px;
      object-fit: cover;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      padding: 6px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,.08);
      color: #fff;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,.12);
      font-weight: 700;
    }
    h1 {
      margin: 0;
      font-size: clamp(32px, 4vw, 48px);
      font-weight: 900;
      background: linear-gradient(90deg, #fff, #93c5fd, #22c55e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .lead { color: #cbd5e1; margin-top: 14px; }
    .feature-list { margin-top: 26px; display: grid; gap: 14px; }
    .feature {
      padding: 18px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
    }
    .login-card { padding: 34px; }
    input {
      width: 100%;
      margin-top: 10px;
      padding: 15px;
      border-radius: 18px;
      background: #020617;
      border: 1px solid rgba(255,255,255,.12);
      color: #fff;
    }
    .submit-btn {
      margin-top: 16px;
      width: 100%;
      padding: 16px;
      border-radius: 18px;
      background: #22c55e;
      font-weight: 900;
      cursor: pointer;
      border: none;
    }
    .message {
      margin-top: 16px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
    }
  </style>
</head>

<body>
  <div class="shell">

    <!-- 🔥 هذا الجزء رجعناه كما كان -->
    <section class="panel">
      <div>
        <div class="topbar">
          <div class="brand">
            <img src="images/logo.png" class="logo">
            <div>
              <div style="font-weight:900">Emotion Car</div>
              <div style="color:#93c5fd">Professionelles Admin-Portal</div>
            </div>
          </div>
          <a href="index.html" class="back-link">Zur Website</a>
        </div>

        <h1>Willkommen im Admin-Bereich</h1>
        <p class="lead">
          Melden Sie sich an, um auf das Dashboard zuzugreifen und Fahrzeuge zu bearbeiten.
        </p>

        <div class="feature-list">
          <div class="feature"><strong>Fahrzeugdaten bearbeiten</strong></div>
          <div class="feature"><strong>Bilder direkt ändern</strong></div>
          <div class="feature"><strong>Sicherer Zugriff</strong></div>
        </div>
      </div>
    </section>

    <!-- 🔥 الفورم كما هو -->
    <section class="login-card">
      <h2>Anmeldung</h2>

      <input id="email" placeholder="E-Mail">
      <input id="password" type="password" placeholder="Passwort">

      <button onclick="loginHandler()" class="submit-btn">Anmelden</button>

      <div id="msg" class="message"></div>
    </section>

  </div>

<script>
const SUPABASE_URL = 'https://mbesnbkludynomgdzfhw.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_EfwicNkVNrNBXKBgoiMXjA_VqTcfnTm';

let supabase;

(async () => {
  const mod = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
  supabase = mod.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
})();

async function loginHandler(){
  const email=document.getElementById('email').value;
  const password=document.getElementById('password').value;
  const msg=document.getElementById('msg');

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  if(error){ msg.textContent=error.message; return; }

  // 🔐 admin check
  const { data: admin } = await supabase
    .from('admin_users')
    .select('*')
    .eq('user_id', data.user.id)
    .maybeSingle();

  if(!admin){
    await supabase.auth.signOut();
    msg.textContent="Kein Zugriff!";
    return;
  }

  window.location.href="dashboard.html";
}
</script>

</body>
</html>
